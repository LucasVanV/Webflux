services:
  db:
    image: postgres:17
    container_name: exo15-postgres
    environment:
      POSTGRES_DB: exo15db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: exo15-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://db:5432/exo15db
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: postgres
      SPRING_SQL_INIT_MODE: always

volumes:
  postgres_data:
